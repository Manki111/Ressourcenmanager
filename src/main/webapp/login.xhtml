<!DOCTYPE html>
<html lang="de"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:h="jakarta.faces.html">

<ui:composition template="WEB-INF/templates/layout.xhtml">

    <ui:define name="content">
        <h2>Anmelden</h2>

        <h:messages globalOnly="true" styleClass="warn-box" redisplay="false"/>

        <h:form id="loginForm">
            <h:panelGrid id="loginGrid" columns="2">

                <h:outputLabel for="username" value="Benutzername"/>
                <h:panelGroup id="usernameGroup">
                    <h:inputText id="username"
                                 value="#{loginController.username}"
                                 required="true"
                                 requiredMessage="Bitte den Benutzernamen eingeben."/>
                    <h:message for="username" styleClass="field-error"/>
                </h:panelGroup>

                <h:outputLabel for="password" value="Passwort"/>
                <h:panelGroup id="passwordGroup">
                    <h:inputSecret id="password"
                                   value="#{loginController.password}"
                                   required="true"
                                   requiredMessage="Bitte das Passwort eingeben."/>
                    <h:message for="password" styleClass="field-error"/>
                </h:panelGroup>

            </h:panelGrid>

            <br/>
            <h:commandButton id="submitLogin" value="Anmelden"
                             action="#{loginController.submitLogin}"/>
        </h:form>

        <div class="divider"/>
        <p class="text-muted">Noch kein Konto?
            <h:link value="Jetzt registrieren" outcome="/register.xhtml"/>
        </p>
    </ui:define>

</ui:composition>
</html>
